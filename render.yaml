services:
  - type: web
    name: comic-generator-backend
    env: python
    repo: .
    branch: main
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_ORIGIN
        value: "*"
        preview: true
        required: false
